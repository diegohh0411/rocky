networks:
  rocky-net:
    driver: bridge

volumes:
  opencode-data:
  redis-data:

services:
  opencode:
    build: ./opencode
    command: "opencode serve --hostname 0.0.0.0 --port 4096 --print-logs --cors https://${TUNNEL_HOSTNAME}"
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - WHATSAPP_API_BASE_URL=http://whatsapp-bridge:8080/api
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GH_TOKEN:-}
    volumes:
      - ./opencode/opencode.jsonc:/home/node/.config/opencode/opencode.base.jsonc:ro
      - ./opencode/opencode.local.jsonc:/home/node/.config/opencode/opencode.local.jsonc:ro
      - ./opencode/config/agents:/home/node/.config/opencode/agents:ro
      - ./opencode/config/skills:/home/node/.config/opencode/skills:ro
      - opencode-data:/home/node/.local/share/opencode
      - /home/pi:/home/pi:rw
      - /home/pi/.gitconfig:/home/node/.gitconfig:ro
      - /home/pi/.ssh:/home/node/.ssh:ro
      - /home/pi/.config/gh:/home/node/.config/gh:ro
      - /home/pi/.local/share/opencode/auth.json:/home/node/.local/share/opencode/auth.json:rw
      - /home/pi/.local/share/opencode/mcp-auth.json:/home/node/.local/share/opencode/mcp-auth.json:rw
      - /home/pi/.supabase:/home/node/.supabase:ro
    networks:
      - rocky-net
    restart: unless-stopped
    depends_on:
      firecrawl-api:
        condition: service_started
      whatsapp-bridge:
        condition: service_started

  whatsapp-bridge:
    image: debian:bookworm-slim
    command: /bridge/whatsapp-bridge
    working_dir: /bridge
    volumes:
      - /home/pi/whatsapp-mcp/whatsapp-bridge:/bridge
      - /etc/ssl/certs:/etc/ssl/certs:ro
    networks:
      - rocky-net
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - rocky-net
    restart: unless-stopped
    depends_on:
      - opencode

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl:latest
    environment:
      ENV: local
      HOST: "0.0.0.0"
      PORT: "3002"
      REDIS_URL: redis://redis:6379
      REDIS_RATE_LIMIT_URL: redis://redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://playwright-service:3000/scrape
      NUQ_RABBITMQ_URL: amqp://rabbitmq:5672
      USE_DB_AUTHENTICATION: "false"
      OPENAI_API_KEY: ${FIRECRAWL_OPENAI_API_KEY:-placeholder}
    networks:
      - rocky-net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      playwright-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  playwright-service:
    image: ghcr.io/firecrawl/playwright-service:latest
    environment:
      PORT: "3000"
    networks:
      - rocky-net
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server --bind 0.0.0.0
    volumes:
      - redis-data:/data
    networks:
      - rocky-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-management
    command: rabbitmq-server
    networks:
      - rocky-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
